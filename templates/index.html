<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Team Optimizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
.container { max-width: 1400px; margin: 0 auto; }
h1 { color: #e94560; margin-bottom: 20px; font-size: 2em; display:inline-block; }
h2 { margin-bottom: 15px; font-size: 1.4em; border-bottom: 2px solid #16213e; padding-bottom: 8px; color: #e94560; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
@media (max-width: 1200px) { .grid { gap: 10px; } .card { padding: 12px; } }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
@media (max-width: 600px) {
  body { padding: 8px; }
  h1 { font-size: 1.4em; margin-bottom: 12px; }
  h2 { font-size: 1.1em; margin-bottom: 10px; }
  .card { padding: 10px; border-radius: 8px; }
  .grid { gap: 8px; }
  .btn { padding: 10px 16px; font-size: 0.9em; min-height: 44px; }
  .btn-sm { padding: 8px 12px; font-size: 0.8em; min-height: 36px; }
  .header-actions { margin-left: 0; width: 100%; gap: 4px; }
  .header-actions input[type="text"] { width: 100% !important; }
  .header-wrap { gap: 6px; }
  .pokemon-item { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .pokemon-item .sprite { width: 48px; height: 48px; }
  .pokemon-item .actions { width: 100%; justify-content: flex-end; }
  .pokemon-item .stats-bar .stat-tag { font-size: 0.65em; padding: 2px 5px; }
  .team-member { flex-wrap: wrap; }
  .team-member img { width: 48px; height: 48px; }
  .team-grid { grid-template-columns: 1fr; }
  .section-header { flex-direction: column; align-items: stretch; }
  .section-header > div { flex-wrap: wrap; gap: 4px; }
  .section-header input, .section-header select { font-size: 0.85em; width: 100% !important; }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 0; flex-wrap: nowrap; }
  .tab { padding: 10px 14px; font-size: 0.85em; white-space: nowrap; }
  .evo-item { flex-wrap: wrap; gap: 6px; padding: 8px; }
  .evo-item .arrow { font-size: 1.2em; }
  .evo-item span[style*="min-width"] { min-width: auto !important; }
  .form-modal-content { padding: 16px; margin: 10px; width: calc(100% - 20px); max-height: 90vh; }
  .form-options { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
  .form-option { padding: 8px; }
  .form-option img { width: 64px; height: 64px; }
  .items-section { gap: 6px; }
  .item-pill { font-size: 0.78em; padding: 3px 10px; }
  .level-cap-section { gap: 8px; }
  .level-cap-section input { width: 60px; font-size: 1em; }
  .compare-stat-row .stat-val { font-size: 0.75em; min-width: 24px; }
  .compare-stat-row .stat-label { min-width: 32px; font-size: 0.65em; }
  #compareResults > div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
  .type-icon { width: 120px; height: 28px; }
  .type-icon-sm { width: 72px; height: 18px; }
  .notification { right: 8px; left: 8px; max-width: none; top: 8px; }
  .add-item-row { flex-direction: column; gap: 6px; }
  .add-item-row input[type="number"] { width: 100%; }
  .add-item-row .autocomplete { width: 100%; }
  #statQuery > div[style*="flex"] { flex-direction: column; align-items: stretch; }
  #statQuery .form-group { min-width: auto; }
  .autocomplete-items { max-height: 200px; font-size: 0.9em; }
  .autocomplete-item { padding: 12px 10px; min-height: 44px; }
  .gym-btn { font-size: 0.7em !important; padding: 8px 4px !important; }
  #levelCapDisplay { font-size: 2.2em !important; }
}
.card { background: #16213e; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
.form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 1em; }
.form-group input:focus { outline: none; border-color: #e94560; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: 600; transition: all 0.2s; }
.btn-primary { background: #e94560; color: white; }
.btn-primary:hover { background: #c73650; }
.btn-success { background: #0f3460; color: white; }
.btn-success:hover { background: #1a4d8f; }
.btn-danger { background: #533483; color: white; }
.btn-danger:hover { background: #6b42a3; }
.btn-warning { background:#e94560; color:white; }
.btn-warning:hover { background:#c73650; }
.btn-sm { padding: 6px 12px; font-size: 0.85em; }
.autocomplete { position: relative; }
.autocomplete-items { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a2e; border: 1px solid #333; border-top: none; border-radius: 0 0 8px 8px; max-height: 250px; overflow-y: auto; z-index: 1000; }
.autocomplete-item { padding: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.autocomplete-item:hover { background: #0f3460; }
.autocomplete-item .info { font-size: 0.8em; color: #888; }
.pokemon-list { margin-top: 15px; }
.pokemon-item { display: flex; align-items: center; padding: 10px; margin-bottom: 8px; background: #1a1a2e; border-radius: 8px; transition: all 0.2s; }
.pokemon-item:hover { background: #0f3460; }
.pokemon-item .sprite { width: 64px; height: 64px; margin-right: 12px; image-rendering: pixelated; background: #111; border-radius: 8px; }
.pokemon-item .info { flex: 1; }
.pokemon-item .info .name { font-weight: 600; font-size: 1.1em; }
.pokemon-item .info .types { font-size: 0.85em; color: #aaa; margin-top: 4px; }
.pokemon-item .actions { display: flex; gap: 6px; }
.pokemon-item .stats-bar { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.pokemon-item .stats-bar .stat-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 600; }
.stat-tag.total { background: #e94560; color: white; }
.stat-tag.hp { background: #ff4444; color: white; }
.stat-tag.attack { background: #ff8c00; color: white; }
.stat-tag.defense { background: #4caf50; color: white; }
.stat-tag.sp_atk { background: #9c27b0; color: white; }
.stat-tag.sp_def { background: #2196f3; color: white; }
.stat-tag.speed { background: #ffeb3b; color: #333; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-top: 10px; }
.team-member { background: #1a1a2e; border-radius: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; }
.team-member img { width: 64px; height: 64px; image-rendering: pixelated; flex-shrink: 0; }
.team-member .info { flex: 1; min-width: 0; }
.team-member .name { font-weight: 600; }
.team-member .value { color: #e94560; font-weight: 700; font-size: 1.1em; }
.team-member .sub { font-size: 0.8em; color: #aaa; }
@media (min-width: 1400px) { .team-grid { grid-template-columns: repeat(6, 1fr); } }
.highlight { background: #ffd700; color: #333; padding: 2px 10px; border-radius: 4px; font-weight: 600; font-size: 0.85em; animation: pulse 2s infinite; margin:4px; display:inline-block; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.evo-item { display: flex; align-items: center; padding: 10px; background: #1a1a2e; border-radius: 8px; margin-bottom: 8px; gap: 10px; flex-wrap:wrap; }
.evo-item .arrow { color: #e94560; font-size: 1.5em; font-weight: 700; }
.evo-item .method { font-size: 0.8em; padding: 2px 8px; border-radius: 4px; background: #333; }
.evo-item .method.item { background: #533483; color: white; }
.evo-item .method.level { background: #0f3460; color: white; }
.evo-item .method.happiness { background: #e94560; color: white; }
.gym-btn.gym-active { background: #c73650 !important; color: #fff !important; }

.tabs { display: flex; gap: 0; margin-bottom: 15px; border-bottom: 2px solid #333; }
.tab { padding: 10px 20px; cursor: pointer; background: none; border: none; color: #888; font-size: 1em; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
.tab.active { color: #e94560; border-bottom-color: #e94560; }
.tab:hover { color: #e0e0e0; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.level-cap-section { display: flex; align-items: center; gap: 15px; flex-wrap:wrap; }
.level-cap-section input { width: 80px; padding: 8px; border: 1px solid #333; border-radius: 8px; background: #1a1a2e; color: #e0e0e0; font-size: 1.2em; text-align: center; }
.items-section { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.item-pill { padding: 4px 14px; border-radius: 20px; background: #333; font-size: 0.85em; display: flex; align-items: center; gap: 8px; }
.item-pill .remove { cursor: pointer; color: #e94560; font-weight: 700; }
.item-pill .remove:hover { color: #ff6b6b; }
.item-pill .stock { color:#4caf50; font-weight:700; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap:wrap; gap:8px; }
.empty-state { text-align: center; padding: 30px; color: #666; font-size: 1.1em; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; font-weight: 600; margin-left: 6px; }
.badge.bug { background: #a8b820; color: #333; }
.badge.dark { background: #705848; color: white; }
.badge.dragon { background: #7038f8; color: white; }
.badge.electric { background: #f8d030; color: #333; }
.badge.fairy { background: #ee99ac; color: #333; }
.badge.fighting { background: #c03028; color: white; }
.badge.fire { background: #f08030; color: white; }
.badge.flying { background: #a890f0; color: #333; }
.badge.ghost { background: #705898; color: white; }
.badge.grass { background: #78c850; color: #333; }
.badge.ground { background: #e0c068; color: #333; }
.badge.ice { background: #98d8d8; color: #333; }
.badge.normal { background: #a8a878; color: #333; }
.badge.poison { background: #a040a0; color: white; }
.badge.psychic { background: #f85888; color: white; }
.badge.rock { background: #b8a038; color: #333; }
.badge.steel { background: #b8b8d0; color: #333; }
.badge.water { background: #6890f0; color: white; }
.notification { position: fixed; top: 20px; right: 20px; background: #e94560; color: white; padding: 15px 25px; border-radius: 8px; z-index: 10000; box-shadow: 0 4px 15px rgba(233,69,96,0.4); animation: slideIn 0.3s, fadeOut 0.3s 4.7s; max-width: 350px; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
.add-item-row { display:flex; gap:6px; align-items:start; flex-wrap:wrap; }
.add-item-row input[type=number] { width:60px; padding:8px; border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#e0e0e0;text-align:center; }
.add-item-row .autocomplete { flex:1; }
.header-wrap { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:20px; }
.header-wrap h1 { margin-bottom:0; }
.header-actions { display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-left:auto; }
.form-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.75); z-index:9999; align-items:center; justify-content:center; }
.form-modal-content { background:#16213e; border-radius:12px; padding:24px; max-width:650px; width:90%; max-height:80vh; overflow-y:auto; }
.form-modal-content h3 { color:#e94560; margin-bottom:16px; }
.form-options { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
.form-option { background:#1a1a2e; border:2px solid #333; border-radius:10px; padding:12px; text-align:center; cursor:pointer; transition:all 0.2s; }
.form-option:hover { border-color:#e94560; background:#0f3460; }
.form-option img { width:96px; height:96px; image-rendering:pixelated; display:block; margin:0 auto; }
.form-option .form-name { font-weight:600; margin-top:6px; font-size:0.9em; color:#e0e0e0; }
.form-option .form-type { font-size:0.75em; color:#aaa; margin-top:4px; }
.form-modal-close { float:right; background:none; border:none; color:#e94560; font-size:1.5em; cursor:pointer; padding:0 4px; }
.compare-stat-row { display:flex; align-items:center; margin:5px 0; gap:0; }
.compare-stat-row .bar-side { flex:1; display:flex; align-items:center; height:22px; }
.compare-stat-row .bar-side.left { justify-content:flex-end; }
.compare-stat-row .bar-side.right { justify-content:flex-start; }
.compare-stat-row .bar { display:inline-block; height:16px; border-radius:4px; transition:width 0.3s; max-width:100%; min-width:2px; }
.compare-stat-row .bar.left { border-radius:4px 0 0 4px; }
.compare-stat-row .bar.right { border-radius:0 4px 4px 0; }
.compare-stat-row .stat-label { min-width:42px; text-align:center; font-weight:bold; font-size:0.75em; color:#888; flex-shrink:0; }
.compare-stat-row .stat-val { font-weight:600; min-width:30px; font-size:0.85em; }
.compare-stat-row .stat-val.left { text-align:right; }
.compare-stat-row .stat-val.right { text-align:left; }
.type-icon { width:200px; height:48px; }
.type-icon-sm { width:100px; height:24px; }
.eff-section { margin-bottom:10px; }
.eff-section .eff-label { font-size:0.8em; font-weight:600; margin-bottom:4px; }
.eff-types { display:flex; flex-wrap:wrap; gap:4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header-wrap">
  <h1 data-i18n="title">Pok&eacute;mon Team Optimizer</h1>
  <div class="header-actions">
    <button class="btn btn-sm" id="langToggle" onclick="toggleLang()" style="background:#0f3460;color:white;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:600;font-size:0.85em;margin-right:4px">EN</button>
    <button class="btn btn-sm btn-danger" onclick="evolveAll()" data-i18n="evolveAll">Evolve All (Level)</button>
    <button class="btn btn-sm btn-warning" onclick="newGame()" data-i18n="newGame">New Game</button>
    <input type="text" id="saveNameInput" placeholder="Save name..." style="padding:6px 10px;border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#e0e0e0;font-size:0.85em;width:140px">
    <button class="btn btn-sm btn-success" onclick="saveBackup()" style="font-size:0.85em">Save</button>
    <input type="file" id="restoreFileInput" accept=".json" style="display:none" onchange="restoreBackup(event)">
    <button class="btn btn-sm btn-primary" onclick="document.getElementById('restoreFileInput').click()" style="font-size:0.85em">Restore</button>
  </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2 data-i18n="addPokemon">Add Pokemon</h2>
      <div class="form-group">
        <label data-i18n="pokeNameLabel">Pokemon Name</label>
        <div class="autocomplete" id="autocomplete-caught">
          <input type="text" id="pokeName" data-i18n-placeholder="pokeNamePlaceholder" placeholder="Type pokemon name...">
          <div class="autocomplete-items" id="autocomplete-list"></div>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="nickLabel">Nickname (optional)</label>
        <input type="text" id="pokeNick" data-i18n-placeholder="nickPlaceholder" placeholder="Nickname">
      </div>
      <div style="text-align:center;margin-top:40px;margin-bottom:-10px"><button class="btn btn-primary" onclick="addCaught()" data-i18n="addToTeam">Add to Team</button></div>
      <div id="addNotification" style="margin-top:10px"></div>
    </div>

    <div class="form-modal" id="formModal">
      <div class="form-modal-content">
        <button class="form-modal-close" onclick="closeFormPicker()">&times;</button>
        <h3 id="formPokeTitle" data-i18n="chooseForm">Choose a form:</h3>
        <div class="form-options" id="formOptions"></div>
      </div>
    </div>

    
      <div class="card">
        <h2 data-i18n="items">Items</h2>
        <div class="add-item-row">
          <div class="autocomplete" style="flex:1;min-width:0" id="autocomplete-item">
            <input type="text" id="itemInput" data-i18n-placeholder="searchItemPlaceholder" placeholder="Search item..." style="width:100%;padding:10px;border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#e0e0e0;font-size:1em;box-sizing:border-box">
            <div class="autocomplete-items" id="item-autocomplete-list"></div>
          </div>
          <input type="number" id="itemQty" value="1" min="1" style="width:60px;padding:10px;border:1px solid #333;border-radius:8px;background:#1a1a2e;color:#e0e0e0;text-align:center;font-size:1em">
          <button class="btn btn-sm btn-success" onclick="addItem()" style="padding:10px 16px" data-i18n="add">Add</button>
        </div>
        <div class="items-section" id="itemsList"></div>
      </div>

      <div class="card">
        <h2 data-i18n="levelCap" style="margin-bottom:8px">Level Cap</h2>
        <div id="levelCapDisplay" style="font-size:3em;font-weight:700;color:#e94560;text-align:center;line-height:1;margin-bottom:20px">14</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
          <button class="btn btn-sm gym-btn" data-cap="23" data-idx="0" onclick="setGymCap(this, 23)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">1st Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 23</span></button>
          <button class="btn btn-sm gym-btn" data-cap="30" data-idx="1" onclick="setGymCap(this, 30)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">2nd Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 30</span></button>
          <button class="btn btn-sm gym-btn" data-cap="39" data-idx="2" onclick="setGymCap(this, 39)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">3rd Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 39</span></button>
          <button class="btn btn-sm gym-btn" data-cap="49" data-idx="3" onclick="setGymCap(this, 49)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">4th Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 49</span></button>
          <button class="btn btn-sm gym-btn" data-cap="54" data-idx="4" onclick="setGymCap(this, 54)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">5th Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 54</span></button>
          <button class="btn btn-sm gym-btn" data-cap="59" data-idx="5" onclick="setGymCap(this, 59)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">6th Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 59</span></button>
          <button class="btn btn-sm gym-btn" data-cap="66" data-idx="6" onclick="setGymCap(this, 66)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">7th Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 66</span></button>
          <button class="btn btn-sm gym-btn" data-cap="75" data-idx="7" onclick="setGymCap(this, 75)" style="background:#333;color:#e0e0e0;padding:6px 8px;font-size:0.78em;display:flex;flex-direction:column;align-items:center;line-height:1.3;height:auto;border:none;border-radius:6px;cursor:pointer;transition:background 0.15s">8th Gym<span style="font-size:0.7em;color:#888;font-weight:400">Lv 75</span></button>
        </div>
      </div>
    
  </div>

  <div class="card" style="margin-bottom:20px">
    <div class="tabs">
      <button class="tab active" data-tab="caught" data-i18n="tabCaught">My Pokemon</button>
      <button class="tab" data-tab="team" data-i18n="tabTeam">Best Team</button>
      <button class="tab" data-tab="evolutions" data-i18n="tabEvolutions">Evolutions</button>
      <button class="tab" data-tab="compare" data-i18n="tabCompare">Compare</button>
    </div>

    <div class="tab-content active" id="tab-caught">
      <div class="section-header">
        <span id="caughtCount">0 Pokemon</span>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">

function t(key, ...args) {
  let str = LANG[currentLang][key];
  if (str === undefined) str = LANG.en[key] || key;
  args.forEach((arg, i) => { str = str.replace(new RegExp('\\{' + i + '\\}', 'g'), arg); });
  return str;
}
function toggleLang() {
  currentLang = currentLang === 'en' ? 'es' : 'en';
  document.getElementById('langToggle').textContent = currentLang.toUpperCase();
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.title = t('title');
  renderCaught();
  loadBestTeam();
  queryByStat();
  loadEvolutions();
}

async function init() {
  await loadAllPokemon();
  await loadCaught();
  await loadLevelCap();
  await loadItems();
  await loadEvolutions();
  await loadBestTeam();

  const cached = loadStateFromCache();
  if (cached) {
    if (caughtData.length === 0) caughtData = cached.caught;
    if (itemsData.length === 0) itemsData = cached.items;
    if (cached.level_cap && !document.querySelector('.gym-btn.gym-active')) {
      document.getElementById('levelCapDisplay').textContent = cached.level_cap;
    }
    renderCaught();
    renderItems();
  }

  setupPokeAutocomplete();
  setupItemAutocomplete();
  setupCompareAutocomplete('compareName1', 'compare-autocomplete-list1');
  setupCompareAutocomplete('compareName2', 'compare-autocomplete-list2');
  setupTabs();
}

async function loadAllPokemon() {
  const resp = await fetch('/api/pokemon');
  const data = await resp.json();
  for (const p of data) {
    const key = p.name + (p.form && p.form.trim() ? ' ' + p.form : '');
    allPokemon[key] = p;
  }
}

function setupPokeAutocomplete() {
  const input = document.getElementById('pokeName');
  const list = document.getElementById('autocomplete-list');
  input.addEventListener('input', function() {
    const val = this.value.trim();
    list.innerHTML = '';
    if (val.length < 1) return;
    fetch('/api/suggestions?q=' + encodeURIComponent(val))
      .then(r => r.json())
      .then(data => {
        list.innerHTML = '';
        for (const p of data) {
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          const status = p.caught ? ' [HAVE]' : '';
          const formIndicator = p.has_regional_forms ? ' <span style="color:#e94560;font-size:0.75em;font-weight:700">[Forms]</span>' : '';
          div.innerHTML = `<span>${p.name}${status}${formIndicator}</span><span class="info">Total: ${p.total}</span>`;
          div.addEventListener('click', function() {
            input.value = p.name;
            list.innerHTML = '';
          });
          list.appendChild(div);
        }
      });
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.autocomplete') || e.target.closest('#autocomplete-item')) return;
    list.innerHTML = '';
  });
}

function setupItemAutocomplete() {
  const input = document.getElementById('itemInput');
  const list = document.getElementById('item-autocomplete-list');
  input.addEventListener('input', function() {
    const val = this.value.trim();
    list.innerHTML = '';
    if (val.length < 1) return;
    fetch('/api/items/catalog?q=' + encodeURIComponent(val))
      .then(r => r.json())
      .then(data => {
        list.innerHTML = '';
        for (const item of data) {
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          div.innerHTML = `<span>${item.name} (${item.code})</span><span class="info">${item.code}</span>`;
          div.addEventListener('click', function() {
            input.value = item.code;
            list.innerHTML = '';
          });
          list.appendChild(div);
        }
      });
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#autocomplete-item')) {
      list.innerHTML = '';
    }
  });
}

function setupCompareAutocomplete(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  input.addEventListener('input', function() {
    const val = this.value.trim();
    list.innerHTML = '';
    if (val.length < 1) return;
    fetch('/api/suggestions?q=' + encodeURIComponent(val))
      .then(r => r.json())
      .then(data => {
        list.innerHTML = '';
        for (const p of data) {
          const div = document.createElement('div');
          div.className = 'autocomplete-item';
          const formIndicator = p.has_regional_forms ? ' <span style="color:#e94560;font-size:0.75em;font-weight:700">[Forms]</span>' : '';
          div.innerHTML = `<span>${p.name}${formIndicator}</span><span class="info">Total: ${p.total}</span>`;
          div.addEventListener('click', function() {
            input.value = p.name;
            list.innerHTML = '';
          });
          list.appendChild(div);
        }
      });
  });
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.autocomplete') || e.target.closest('#autocomplete-compare1') || e.target.closest('#autocomplete-compare2')) return;
    list.innerHTML = '';
  });
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    });
  });
}

function getTypeBadge(type) {
  if (!type || type.trim() === '') return '';
  return `<span class="badge ${type.toLowerCase().trim()}">${type}</span>`;
}

function showNotification(msg) {
  const div = document.createElement('div');
  div.className = 'notification';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 5000);
}

async function addCaught() {
  const name = document.getElementById('pokeName').value.trim();
  const nick = document.getElementById('pokeNick').value.trim() || name;
  if (!name) { showNotification(t('pleaseName')); return; }

  const formsResp = await fetch('/api/pokemon/forms?name=' + encodeURIComponent(name));
  const forms = await formsResp.json();

  if (forms.length > 1) {
    const hasRegional = forms.some(f => f.regional);
    if (hasRegional) {
      showFormPicker(forms, nick);
      return;
    }
  }

  await doAddCaught(name, '', nick);
}

async function doAddCaught(name, form, nick) {
  const resp = await fetch('/api/caught', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, form, nickname: nick, level: 1})
  });
  const result = await resp.json();

  if (resp.ok) {
    showNotification(t('addedPoke', name));
    document.getElementById('pokeName').value = '';
    document.getElementById('pokeNick').value = '';
    const noteDiv = document.getElementById('addNotification');
    noteDiv.innerHTML = '';
    if (result.highlights && result.highlights.length > 0) {
      for (const h of result.highlights) {
        const badge = document.createElement('span');
        badge.className = 'highlight';
        badge.textContent = h;
        noteDiv.appendChild(badge);
      }
    }
    await loadCaught();
    await loadEvolutions();
    await loadBestTeam();
  } else {
    showNotification(result.error || t('errorAdd'));
  }
}

let _pendingNick = '';

function showFormPicker(forms, nick) {
  _pendingNick = nick;
  const modal = document.getElementById('formModal');
  document.getElementById('formPokeTitle').textContent = forms[0].name + ' - ' + t('chooseForm');
  const options = document.getElementById('formOptions');
  options.innerHTML = '';

  for (const f of forms) {
    const div = document.createElement('div');
    div.className = 'form-option';
    const displayName = f.form && f.form.trim() ? f.form : f.name;
    div.innerHTML = `
      <img src="" alt="${displayName.replace(/"/g, '&quot;')}" data-sprite="${f.sprite_name}">
      <div class="form-name">${displayName}</div>
      <div class="form-type">${getTypeBadge(f.type1)} ${getTypeBadge(f.type2)}</div>`;
    div.onclick = () => {
      modal.style.display = 'none';
      doAddCaught(f.name, f.form || '', _pendingNick);
    };
    options.appendChild(div);
  }

  modal.style.display = 'flex';
  options.querySelectorAll('img[data-sprite]').forEach(img => loadSprite(img));
}

function closeFormPicker() {
  document.getElementById('formModal').style.display = 'none';
}

async function loadCaught() {
  const resp = await fetch('/api/caught');
  caughtData = await resp.json();
  caughtPage = 1;
  renderCaught();
  saveStateToCache();
}

function renderCaught() {
  const query = document.getElementById('caughtSearch').value.toLowerCase().trim();
  const typeFilter = document.getElementById('typeFilter').value;
  const sort = document.getElementById('sortOrder').value;
  let filtered = caughtData;
  if (query) {
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(query) ||
      (c.nickname && c.nickname.toLowerCase().includes(query))
    );
  }
  if (typeFilter) {
    filtered = filtered.filter(c => {
      const key = c.name + (c.form && c.form.trim() ? ' ' + c.form : '');
      const poke = allPokemon[key] || {};
      return poke.type1 === typeFilter || poke.type2 === typeFilter;
    });
  }
  if (sort === 'oldest') {
    filtered = filtered.slice().reverse();
  } else if (sort === 'name') {
    filtered = filtered.slice().sort((a, b) => a.name.localeCompare(b.name));
  } else if (sort === 'name_desc') {
    filtered = filtered.slice().sort((a, b) => b.name.localeCompare(a.name));
  }

  const list = document.getElementById('caughtList');
  const pagination = document.getElementById('caughtPagination');
  list.innerHTML = '';
  pagination.innerHTML = '';
  document.getElementById('caughtCount').textContent = filtered.length + ' ' + t('pokemon') + ((query || typeFilter) ? ' ' + t('filtered') : '');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">' + ((query || typeFilter) ? t('noMatch') : t('noCaught')) + '</div>';
    return;
  }

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (caughtPage > totalPages) caughtPage = totalPages;
  const start = (caughtPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  for (const c of pageItems) {
    const key = c.name + (c.form && c.form.trim() ? ' ' + c.form : '');
    const poke = allPokemon[key] || {};
    const item = document.createElement('div');
    item.className = 'pokemon-item';
    const formForSprite = c.form && c.form.trim() ? c.form : '';
    const spriteName = c.name.toLowerCase().replace(/[.'()]/g, '').replace(/ /g, '-').replace(/[♀]/g, '-f').replace(/[♂]/g, '-m');
    item.innerHTML = `
      <img class="sprite" src="" alt="${c.name}" data-sprite="${spriteName}" data-form="${formForSprite}">
      <div class="info">
        <div>
          <span class="name">${c.nickname !== c.name ? c.nickname + ' (' + c.name + ')' : c.name}</span>
        </div>
        <div class="types">${getTypeBadge(poke.type1)} ${getTypeBadge(poke.type2)}</div>
        <div class="stats-bar">
          <span class="stat-tag total">T:${poke.total || '?'}</span>
          <span class="stat-tag hp">HP:${poke.hp || '?'}</span>
          <span class="stat-tag attack">ATK:${poke.attack || '?'}</span>
          <span class="stat-tag defense">DEF:${poke.defense || '?'}</span>
          <span class="stat-tag sp_atk">SPA:${poke.sp_atk || '?'}</span>
          <span class="stat-tag sp_def">SPD:${poke.sp_def || '?'}</span>
          <span class="stat-tag speed">SPE:${poke.speed || '?'}</span>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-danger" onclick="deleteCaught('${c.name.replace(/'/g, "\\'")}')">${t('del')}</button>
      </div>`;
    list.appendChild(item);
    loadSprite(item.querySelector('.sprite'));
  }

  if (totalPages > 1) {
    if (caughtPage > 1) {
      const first = document.createElement('button');
      first.className = 'btn btn-sm btn-primary';
      first.textContent = t('first');
      first.onclick = () => { caughtPage = 1; renderCaught(); };
      pagination.appendChild(first);
      const prev = document.createElement('button');
      prev.className = 'btn btn-sm btn-primary';
      prev.textContent = t('prev');
      prev.onclick = () => { caughtPage--; renderCaught(); };
      pagination.appendChild(prev);
    }
    const span = document.createElement('span');
    span.style.cssText = 'padding:6px 12px;color:#aaa';
    span.textContent = t('page') + ' ' + caughtPage + ' / ' + totalPages;
    pagination.appendChild(span);
    if (caughtPage < totalPages) {
      const next = document.createElement('button');
      next.className = 'btn btn-sm btn-primary';
      next.textContent = t('next');
      next.onclick = () => { caughtPage++; renderCaught(); };
      pagination.appendChild(next);
      const last = document.createElement('button');
      last.className = 'btn btn-sm btn-primary';
      last.textContent = t('last');
      last.onclick = () => { caughtPage = totalPages; renderCaught(); };
      pagination.appendChild(last);
    }
  }
}

function saveStateToCache() {
  const state = {
    caught: caughtData,
    items: itemsData,
    level_cap: parseInt(document.getElementById('levelCapDisplay').textContent) || 14
  };
  try { localStorage.setItem('pokemon_optimizer_state', JSON.stringify(state)); } catch(e) {}
}

function loadStateFromCache() {
  try {
    const data = localStorage.getItem('pokemon_optimizer_state');
    return data ? JSON.parse(data) : null;
  } catch(e) { return null; }
}

const spriteCache = {};

async function loadSprite(imgEl) {
  const name = imgEl.dataset.sprite;
  const form = imgEl.dataset.form || '';
  const key = name + '|' + form;
  if (spriteCache[key]) {
    imgEl.onload = () => { imgEl.style.display = 'block'; };
    imgEl.onerror = () => { imgEl.style.display = 'none'; };
    imgEl.src = spriteCache[key];
    return;
  }
  try {
    let url = '/api/sprite/' + encodeURIComponent(name);
    if (form) {
      url += '?form=' + encodeURIComponent(form);
    }
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.sprite) {
      spriteCache[key] = data.sprite;
      imgEl.onload = () => { imgEl.style.display = 'block'; };
      imgEl.onerror = () => { imgEl.style.display = 'none'; };
      imgEl.src = data.sprite;
    } else {
      imgEl.style.display = 'none';
    }
  } catch {
    imgEl.style.display = 'none';
  }
}

async function deleteCaught(name) {
  if (!confirm(t('delConfirm', name))) return;
  await fetch('/api/caught/' + encodeURIComponent(name), { method: 'DELETE' });
  showNotification(t('deleted', name));
  await loadCaught();
  await loadEvolutions();
  await loadBestTeam();
}

async function deleteAllCaught() {
  if (!confirm('Delete ALL Pokemon? This cannot be undone.')) return;
  await fetch('/api/caught/clear', { method: 'DELETE' });
  showNotification('All Pokemon deleted');
  await loadCaught();
  await loadEvolutions();
  await loadBestTeam();
}

async function saveBackup() {
  const name = document.getElementById('saveNameInput').value.trim() || 'backup';

  const cap = parseInt(document.getElementById('levelCapDisplay').textContent) || 14;
  const saveData = {
    name: name,
    timestamp: new Date().toISOString(),
    version: 1,
    caught: caughtData,
    items: itemsData,
    level_cap: cap
  };

  saveStateToCache();

  const blob = new Blob([JSON.stringify(saveData, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pokemon_save_${name.replace(/[^a-zA-Z0-9]/g, '_')}.json`;
  a.click();
  URL.revokeObjectURL(url);

  showNotification(`Saved as "${name}"`);
  document.getElementById('saveNameInput').value = '';
}

async function restoreBackup(event) {
  const file = event.target.files[0];
  if (!file) return;

  try {
    const text = await file.text();
    const data = JSON.parse(text);

    if (!data.caught || !data.items) {
      showNotification('Invalid save file: missing caught or items data');
      return;
    }

    if (!confirm(`Restore backup "${data.name || 'unknown'}"? Current data will be replaced.`)) {
      event.target.value = '';
      return;
    }

    caughtData = data.caught;
    itemsData = data.items;
    const cap = data.level_cap || 14;
    document.getElementById('levelCapDisplay').textContent = cap;

    saveStateToCache();

    renderCaught();
    renderItems();
    loadBestTeam();
    loadEvolutions();

    try {
      await fetch('/api/caught/clear', { method: 'DELETE' });
      for (const c of caughtData) {
        await fetch('/api/caught', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(c)
        });
      }
      await fetch('/api/level-cap', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({level_cap: cap})
      });
      await fetch('/api/items', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({item: '_clear_', quantity: 0})
      });
      for (const item of itemsData) {
        await fetch('/api/items', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({item: item.name, quantity: item.stock})
        });
      }
    } catch(e) {}

    showNotification(`Backup "${data.name || 'unknown'}" restored!`);
  } catch(e) {
    showNotification('Failed to load save file: ' + e.message);
  }

  event.target.value = '';
}

async function newGame() {
  if (!confirm('Start a new game? Current data will be lost!')) return;
  if (!confirm('Really? All data will be lost forever!')) return;

  caughtData = [];
  itemsData = [];
  document.getElementById('levelCapDisplay').textContent = 14;
  gymMaxIdx = -1;
  document.querySelectorAll('.gym-btn').forEach(b => b.classList.remove('gym-active'));
  saveStateToCache();

  try {
    await fetch('/api/new-game', { method: 'POST' });
  } catch(e) {}

  renderCaught();
  renderItems();
  loadBestTeam();
  loadEvolutions();
  document.getElementById('addNotification').innerHTML = '';
  showNotification('New game started!');
}

async function loadBestTeam() {
  const resp = await fetch('/api/team/best');
  const team = await resp.json();
  const div = document.getElementById('bestTeam');
  div.innerHTML = '';
  if (team.length === 0) {
    div.innerHTML = '<div class="empty-state">' + t('noPokeYet') + '</div>';
    return;
  }
  for (const c of team) {
    const member = document.createElement('div');
    member.className = 'team-member';
    const form = c.form && c.form.trim() ? c.form : '';
    const spriteName = c.name.toLowerCase().replace(/[.'()]/g, '').replace(/ /g, '-').replace(/[♀]/g, '-f').replace(/[♂]/g, '-m');
    member.innerHTML = `
      <img src="" alt="${c.name}" data-sprite="${spriteName}" data-form="${form}">
      <div class="name">${c.name}</div>
      <div class="value">${c.total}</div>
      <div style="font-size:0.85em;color:#aaa">${t('totalStats')}</div>`;
    div.appendChild(member);
    loadSprite(member.querySelector('img'));
  }
}

async function queryByStat() {
  const stat = document.getElementById('statSelect').value;
  const resp = await fetch('/api/team/best-stat?stat=' + stat);
  const results = await resp.json();
  const div = document.getElementById('statResults');
  div.innerHTML = '';
  if (results.length === 0) {
    div.innerHTML = '<div class="empty-state">' + t('noPokeYet') + '</div>';
    return;
  }
  const statNames = {hp:'HP', attack:'Attack', defense:'Defense', sp_atk:'Sp. Atk', sp_def:'Sp. Def', speed:'Speed', total:'Total'};
  for (const c of results) {
    const member = document.createElement('div');
    member.className = 'team-member';
    const total = c.stats ? c.stats.total : '?';
    const form = c.form && c.form.trim() ? c.form : '';
    const spriteName = c.name.toLowerCase().replace(/[.'()]/g, '').replace(/ /g, '-').replace(/[♀]/g, '-f').replace(/[♂]/g, '-m');
    member.innerHTML = `
      <img src="" alt="${c.name}" data-sprite="${spriteName}" data-form="${form}">
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="value">${c.value}</div>
        <div class="sub">${statNames[stat] || stat} &middot; Total: ${total}</div>
      </div>`;
    div.appendChild(member);
    loadSprite(member.querySelector('img'));
  }
}

let gymMaxIdx = -1;

function setGymCap(el, val) {
  const idx = parseInt(el.dataset.idx);
  const gymCaps = [23,30,39,49,54,59,66,75];
  let newMax = idx;
  if (idx === gymMaxIdx) {
    newMax = idx - 1;
  }
  gymMaxIdx = newMax;
  const newCap = newMax >= 0 ? gymCaps[newMax] : 14;
  document.querySelectorAll('.gym-btn').forEach(b => {
    b.classList.toggle('gym-active', parseInt(b.dataset.idx) <= newMax);
  });
  document.getElementById('levelCapDisplay').textContent = newCap;
  saveStateToCache();
  fetch('/api/level-cap', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({level_cap: newCap})
  }).then(() => {
    showNotification(t('lvlCapSet', newCap));
    loadEvolutions();
  });
}


async function loadLevelCap() {
  const resp = await fetch('/api/level-cap');
  const data = await resp.json();
  const cap = data.level_cap || 14;
  document.getElementById('levelCapDisplay').textContent = cap;
  saveStateToCache();
  const gymCaps = [23,30,39,49,54,59,66,75];
  gymMaxIdx = -1;
  for (let i = gymCaps.length - 1; i >= 0; i--) {
    if (cap >= gymCaps[i]) { gymMaxIdx = i; break; }
  }
  document.querySelectorAll('.gym-btn').forEach(b => {
    b.classList.toggle('gym-active', parseInt(b.dataset.idx) <= gymMaxIdx);
  });
}

async function loadItems() {
  const resp = await fetch('/api/items');
  itemsData = await resp.json();
  renderItems();
}

function renderItems() {
  const div = document.getElementById('itemsList');
  div.innerHTML = '';
  for (const item of itemsData) {
    const pill = document.createElement('span');
    pill.className = 'item-pill';
    const stockInfo = item.stock > 1 ? ` <span class="stock">x${item.stock}</span>` : '';
    pill.innerHTML = `${item.name}${stockInfo} <span class="remove" onclick="removeItem('${item.name}')">&times;</span>`;
    div.appendChild(pill);
  }
}

async function addItem() {
  const input = document.getElementById('itemInput');
  const qty = parseInt(document.getElementById('itemQty').value) || 1;
  const item = input.value.trim().toUpperCase();
  if (!item) return;
  await fetch('/api/items', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({item, quantity: qty})
  });
  input.value = '';
  document.getElementById('itemQty').value = '1';
  const existing = itemsData.find(i => i.name === item);
  if (existing) existing.stock += qty;
  else itemsData.push({name: item, stock: qty});
  renderItems();
  saveStateToCache();
  showNotification(t('addedItem', item, qty));
  await loadEvolutions();
}

async function removeItem(item) {
  await fetch('/api/items/' + encodeURIComponent(item), { method: 'DELETE' });
  itemsData = itemsData.filter(i => i.name !== item);
  renderItems();
  saveStateToCache();
  await loadEvolutions();
}

async function loadEvolutions() {
  const resp = await fetch('/api/evolutions/available');
  const evos = await resp.json();
  const div = document.getElementById('evoList');
  div.innerHTML = '';
  document.getElementById('evoCount').textContent = evos.length + ' ' + (evos.length === 1 ? t('availEvo_s') : t('availEvo'));
  if (evos.length === 0) {
    div.innerHTML = '<div class="empty-state">' + t('noEvo') + '</div>';
    return;
  }
  for (const evo of evos) {
    const el = document.createElement('div');
    el.className = 'evo-item';
    const methodClass = evo.method.toLowerCase().includes('item') ? 'item' : evo.method.toLowerCase().includes('level') ? 'level' : 'happiness';
    const fromForm = evo.from_form || '';
    const canEvolve = evo.can_evolve;
    const btnHtml = canEvolve
      ? `<button class="btn btn-sm btn-success" onclick="evolve('${evo.from.replace(/'/g, "\\'")}', '${evo.to.replace(/'/g, "\\'")}', '${(fromForm || '').replace(/'/g, "\\'")}', '${(evo.item || '').replace(/'/g, "\\'")}')" style="margin-left:auto">${t('evoBtn')}</button>`
      : `<span style="margin-left:auto;color:#e94560;font-size:0.85em;font-weight:600">${evo.reason}</span>`;
    el.innerHTML = `
      <span style="font-weight:600;min-width:120px">${evo.from}</span>
      <span class="arrow">&rarr;</span>
      <span style="font-weight:600;color:#4caf50;min-width:120px">${evo.to}</span>
      <span class="method ${methodClass}">${evo.method}${evo.item ? ': ' + evo.item : ''}</span>
      ${btnHtml}`;
    div.appendChild(el);
  }
}

async function evolve(from, to, form, item) {
  const msg = item ? t('evoConfirmItem', from, to, item) : t('evoConfirm', from, to);
  if (!confirm(msg)) return;
  const body = {from, to};
  if (form) body.form = form;
  if (item) body.item = item;
  const resp = await fetch('/api/evolve', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const result = await resp.json();
  if (resp.ok) {
    showNotification(t('evolved', from, to));
    await loadCaught();
    await loadEvolutions();
    await loadBestTeam();
    await loadItems();
  } else {
    showNotification(result.error || t('evoFail'));
  }
}

async function evolveAll() {
  if (!confirm(t('evoAllConfirm'))) return;
  const resp = await fetch('/api/evolve-all', { method: 'POST' });
  const result = await resp.json();
  if (result.evolved > 0) {
    showNotification(t('evolvedCount', result.evolved));
  } else {
    showNotification(t('noLvlEvo'));
  }
  await loadCaught();
  await loadEvolutions();
  await loadBestTeam();
}

async function comparePokemon() {
  const name1 = document.getElementById('compareName1').value.trim();
  const name2 = document.getElementById('compareName2').value.trim();
  if (!name1 || !name2) { showNotification(t('compareBothReq')); return; }
  const resp = await fetch('/api/compare?name1=' + encodeURIComponent(name1) + '&name2=' + encodeURIComponent(name2));
  if (!resp.ok) { showNotification(t('compareNotFound')); return; }
  renderCompare(await resp.json());
}

function getStatColor(val) {
  const colors = ['#FA5858', '#FAAC58', '#F7D358', '#F4FA58', '#82FA58', '#58FAAC'];
  const ranges = [40, 60, 80, 100, 120];
  for (let i = 0; i < ranges.length; i++) {
    if (val <= ranges[i]) return colors[i];
  }
  return colors[5];
}

function renderCompare(data) {
  const p1 = data.pokemon1, p2 = data.pokemon2;
  const eff1 = data.effectiveness1, eff2 = data.effectiveness2;
  const div = document.getElementById('compareResults');
  const maxStat = 255;
  const stats = [['hp','HP'],['attack','ATK'],['defense','DEF'],['sp_atk','SPA'],['sp_def','SPD'],['speed','SPE']];

  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">';
  for (const p of [p1, p2]) {
    html += '<div class="card" style="padding:15px;text-align:center">'
      + '<div style="font-size:1.2em;font-weight:700;margin-bottom:6px">' + p.name + (p.form && p.form.trim() ? ' (' + p.form + ')' : '') + '</div>'
      + '<div style="margin:6px 0;display:flex;justify-content:center;gap:4px">'
      + '<img src="/types/' + p.type1 + '.Png" alt="' + p.type1 + '" class="type-icon">'
      + (p.type2.trim() ? '<img src="/types/' + p.type2.trim() + '.Png" alt="' + p.type2.trim() + '" class="type-icon">' : '')
      + '</div>'
      + '<div style="font-size:0.85em;color:#aaa">' + t('compareTotal') + ' <span style="color:#e94560;font-weight:700">' + p.total + '</span></div>'
      + '</div>';
  }
  html += '</div>';

  html += '<div class="card" style="padding:15px;margin-bottom:20px">'
    + '<div style="font-size:1.1em;font-weight:700;margin-bottom:10px;color:#e94560">' + t('compareStats') + '</div>'
    + '<div style="display:flex;align-items:center;margin-bottom:4px;font-size:0.8em;color:#666">'
    + '<div style="flex:1;text-align:right">' + p1.name + '</div>'
    + '<div style="min-width:42px;text-align:center"></div>'
    + '<div style="flex:1;text-align:left">' + p2.name + '</div></div>';

  for (const [key, label] of stats) {
    const v1 = p1[key], v2 = p2[key];
    const w1 = Math.min(v1 / maxStat * 100, 100), w2 = Math.min(v2 / maxStat * 100, 100);
    html += '<div class="compare-stat-row">'
      + '<div class="bar-side left">'
      + '<span class="bar left" style="background:' + getStatColor(v1) + ';width:' + w1 + '%"></span>'
      + '<span class="stat-val left">' + v1 + '</span>'
      + '</div>'
      + '<div class="stat-label">' + label + '</div>'
      + '<div class="bar-side right">'
      + '<span class="stat-val right">' + v2 + '</span>'
      + '<span class="bar right" style="background:' + getStatColor(v2) + ';width:' + w2 + '%"></span>'
      + '</div>'
      + '</div>';
  }
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">';
  html += renderEffectiveness(p1, eff1);
  html += renderEffectiveness(p2, eff2);
  html += '</div>';

  div.innerHTML = html;
}

function renderEffectiveness(pokemon, eff) {
  const effKeys = {
    '0.0': 'effImmune', '0.25': 'effResists4', '0.5': 'effResists2',
    '1.0': 'effNeutral', '2.0': 'effWeak2', '4.0': 'effWeak4'
  };
  const effColors = {
    '0.0': '#666', '0.25': '#4caf50', '0.5': '#66bb6a',
    '1.0': '#888', '2.0': '#ff8c00', '4.0': '#e94560'
  };
  let html = '<div class="card" style="padding:15px">'
    + '<div style="font-size:1em;font-weight:700;margin-bottom:10px;color:#e94560">' + t('compareMatchups', pokemon.name) + '</div>';
  const sorted = Object.keys(eff).sort((a, b) => parseFloat(b) - parseFloat(a));
  for (const mult of sorted) {
    const label = effKeys[mult] ? t(effKeys[mult]) : 'x' + mult;
    const col = effColors[mult] || '#aaa';
    html += '<div class="eff-section">'
      + '<div class="eff-label" style="color:' + col + '">' + label + '</div>'
      + '<div class="eff-types">';
    for (const t of eff[mult]) {
      html += '<img src="/types/' + t + '.Png" alt="' + t + '" title="' + t + '" class="type-icon-sm">';
    }
    html += '</div></div>';
  }
  if (sorted.length === 0) html += '<div style="color:#666">No data</div>';
  html += '</div>';
  return html;
}
